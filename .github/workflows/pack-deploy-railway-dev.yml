name: Railway Dev Deploy

on:
  workflow_call:
    inputs:
      project-id:
        description: 'Railway project ID'
        required: true
        type: string
      service-name:
        description: 'Railway service name'
        required: false
        default: ''
        type: string
      railway-environment:
        description: 'Railway environment'
        required: false
        default: 'development'
        type: string
      domain:
        description: 'Custom domain (leave empty for Railway URL only)'
        required: false
        default: ''
        type: string
      run-quality-checks:
        description: 'Run quality checks before deployment'
        required: false
        default: true
        type: boolean
      node-version:
        description: 'Node.js version'
        required: false
        default: '20'
        type: string
      pnpm-version:
        description: 'pnpm version'
        required: false
        default: '10.11.0'
        type: string
      working-directory:
        description: 'Working directory'
        required: false
        default: '.'
        type: string
      deploy-detach:
        description: 'Deploy without waiting for completion'
        required: false
        default: false
        type: boolean
      configure-dns:
        description: 'Configure DNS with Cloudflare'
        required: false
        default: false
        type: boolean
      app-env:
        description: 'Application environment (LOCAL/DEV/PROD)'
        required: false
        default: 'DEV'
        type: string
    secrets:
      RAILWAY_TOKEN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      FLY_API_TOKEN:
        required: false
    outputs:
      deployed-url:
        description: 'Deployed application URL'
        value: ${{ (inputs.configure-dns && inputs.domain != '' && jobs.dns.outputs.custom-url) || jobs.deploy.outputs.railway-url }}

jobs:
  quality-checks:
    name: QA
    if: inputs.run-quality-checks
    uses: ./.github/workflows/pack-quality-checks.yml
    with:
      run-lint: true
      run-typecheck: true
      run-test: true
      run-build: true
      run-security: false
      test-coverage: false
      node-version: ${{ inputs.node-version }}
      pnpm-version: ${{ inputs.pnpm-version }}
      working-directory: ${{ inputs.working-directory }}
      
  deploy:
    name: Railway
    needs: [quality-checks]
    if: always() && (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped')
    uses: ./.github/workflows/job-deploy-railway.yml
    with:
      environment: development
      project-id: ${{ inputs.project-id }}
      service-name: ${{ inputs.service-name }}
      railway-environment: ${{ inputs.railway-environment }}
      deploy-detach: ${{ inputs.deploy-detach }}
      app-env: ${{ inputs.app-env }}
    secrets:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      
  dns:
    name: DNS
    needs: [deploy]
    if: needs.deploy.result == 'success' && inputs.domain != '' && inputs.configure-dns
    uses: ./.github/workflows/job-dns-cloudflare.yml
    with:
      domain: ${{ inputs.domain }}
      subdomain: ''
      app-name: ${{ inputs.service-name || 'railway-app' }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
  summary:
    name: Development Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, deploy, dns]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### 🚂 Railway Development Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality-checks.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          
          # DNS status with explanation
          DNS_STATUS="${{ needs.dns.result || 'skipped' }}"
          if [[ "${{ inputs.configure-dns }}" == "false" ]]; then
            DNS_STATUS="skipped (disabled)"
          elif [[ -z "${{ inputs.domain }}" ]]; then
            DNS_STATUS="skipped (no domain)"
          fi
          echo "| DNS | $DNS_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            # Determine final URL
            if [[ "${{ inputs.configure-dns }}" == "true" ]] && [[ -n "${{ inputs.domain }}" ]] && [[ "${{ needs.dns.result }}" == "success" ]]; then
              echo "✅ **Deployed to:** https://${{ inputs.domain }}" >> $GITHUB_STEP_SUMMARY
              echo "🌐 **DNS configured:** Custom domain configured with Cloudflare" >> $GITHUB_STEP_SUMMARY
            elif [[ -n "${{ inputs.domain }}" ]] && [[ "${{ inputs.configure-dns }}" == "false" ]]; then
              echo "✅ **Deployed to:** ${{ needs.deploy.outputs.railway-url }}" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **DNS skipped:** You can configure DNS manually later or re-run with configure-dns=true" >> $GITHUB_STEP_SUMMARY
              echo "💡 **Custom domain:** Configure DNS manually to point ${{ inputs.domain }} to your Railway app" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **Deployed to:** ${{ needs.deploy.outputs.railway-url }}" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "🏷️ **Environment:** ${{ inputs.railway-environment }}" >> $GITHUB_STEP_SUMMARY
            echo "📦 **Project ID:** ${{ inputs.project-id }}" >> $GITHUB_STEP_SUMMARY
            
            if [[ -n "${{ inputs.service-name }}" ]]; then
              echo "⚙️ **Service:** ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ **Deployment failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
name: Railway Production Deployment

on:
  workflow_call:
    inputs:
      project-id:
        description: 'Railway project ID'
        required: true
        type: string
      service-name:
        description: 'Railway service name'
        required: true
        type: string
      railway-environment:
        description: 'Railway environment (production/staging)'
        required: false
        default: 'production'
        type: string
      domain:
        description: 'Custom domain for DNS configuration'
        required: false
        type: string
      node-version:
        description: 'Node.js version'
        required: false
        default: '22'
        type: string
      pnpm-version:
        description: 'pnpm version'
        required: false
        default: '10.11.0'
        type: string
      working-directory:
        description: 'Working directory'
        required: false
        default: '.'
        type: string
      checkout-ref:
        description: 'Git ref to checkout'
        required: false
        default: 'main'
        type: string
      app-env:
        description: 'Application environment variable'
        required: false
        default: 'PROD'
        type: string
      run-quality-checks:
        description: 'Run quality checks before deployment'
        required: false
        default: true
        type: boolean
      configure-dns:
        description: 'Configure Cloudflare DNS'
        required: false
        default: false
        type: boolean
      require-approval:
        description: 'Require manual approval'
        required: false
        default: true
        type: boolean
    secrets:
      RAILWAY_TOKEN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
    outputs:
      deployed-url:
        description: 'Deployed application URL'
        value: ${{ jobs.deploy.outputs.railway-url }}
      deployment-status:
        description: 'Overall deployment status'
        value: ${{ jobs.summary.outputs.status }}

jobs:
  quality-checks:
    name: Quality Assurance
    if: inputs.run-quality-checks
    uses: ./.github/workflows/pack-quality-checks.yml
    with:
      run-lint: true
      run-typecheck: true
      run-test: true
      run-build: true
      run-security: true
      test-coverage: true
      node-version: ${{ inputs.node-version }}
      pnpm-version: ${{ inputs.pnpm-version }}
      working-directory: ${{ inputs.working-directory }}

  approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: inputs.require-approval && (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped')
    environment: production
    steps:
      - name: Request Manual Approval
        run: |
          echo "### 🚨 Production Deployment Approval Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ inputs.service-name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.railway-environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch/Ref:** ${{ inputs.checkout-ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Working Directory:** ${{ inputs.working-directory }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please review the quality checks above and approve this production deployment to proceed." >> $GITHUB_STEP_SUMMARY
          echo "🔍 This will deploy to Railway's **${{ inputs.railway-environment }}** environment." >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Railway Production Deploy
    needs: [quality-checks, approval]
    if: always() && (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') && (needs.approval.result == 'success' || !inputs.require-approval)
    uses: ./.github/workflows/job-deploy-railway.yml
    with:
      environment: production
      project-id: ${{ inputs.project-id }}
      service-name: ${{ inputs.service-name }}
      railway-environment: ${{ inputs.railway-environment }}
      checkout-ref: ${{ inputs.checkout-ref }}
      app-env: ${{ inputs.app-env }}
    secrets:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  dns-configuration:
    name: Configure DNS
    needs: [deploy]
    if: needs.deploy.result == 'success' && inputs.configure-dns && inputs.domain
    runs-on: ubuntu-latest
    steps:
      - name: Setup Cloudflare DNS
        uses: actions/checkout@v4
      
      - name: Configure Production DNS
        run: |
          echo "🌐 Configuring DNS for production deployment..."
          echo "**Domain:** ${{ inputs.domain }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ needs.deploy.outputs.railway-url }}" >> $GITHUB_STEP_SUMMARY
          
          # Extract Railway domain from URL
          RAILWAY_DOMAIN=$(echo "${{ needs.deploy.outputs.railway-url }}" | sed 's|https://||')
          
          # Configure Cloudflare DNS record (CNAME pointing to Railway)
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{
              \"type\": \"CNAME\",
              \"name\": \"@\",
              \"content\": \"$RAILWAY_DOMAIN\",
              \"ttl\": 1,
              \"proxied\": true
            }"
          
          echo "✅ DNS configuration completed"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, approval, deploy, dns-configuration]
    if: always()
    outputs:
      status: ${{ steps.determine-status.outputs.status }}
    steps:
      - name: Determine Overall Status
        id: determine-status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            OVERALL_STATUS="✅ SUCCESS"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            OVERALL_STATUS="❌ FAILED"
          fi
          echo "OVERALL_STATUS=$OVERALL_STATUS" >> $GITHUB_ENV
      
      - name: Generate Summary Report
        run: |
          echo "## 🚀 Railway Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status:** $OVERALL_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| Stage | Status | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality-checks.result || '⏭️ skipped' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Manual Approval | ${{ needs.approval.result || '⏭️ skipped' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway Deploy | ${{ needs.deploy.result || '❌ failed' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "| DNS Configuration | ${{ needs.dns-configuration.result || '⏭️ skipped' }} | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "### 🎯 Deployment Details" >> $GITHUB_STEP_SUMMARY
            echo "- **Service:** \`${{ inputs.service-name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Environment:** \`${{ inputs.railway-environment }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Railway URL:** ${{ needs.deploy.outputs.railway-url }}" >> $GITHUB_STEP_SUMMARY
            
            if [[ -n "${{ inputs.domain }}" && "${{ inputs.configure-dns }}" == "true" ]]; then
              echo "- **Custom Domain:** https://${{ inputs.domain }}" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🚆 **Platform:** Railway (${{ inputs.railway-environment }})" >> $GITHUB_STEP_SUMMARY
            echo "🌍 **Region:** Auto-assigned by Railway" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "The production deployment could not be completed. Please check the logs above for detailed error information." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Verify Railway token permissions" >> $GITHUB_STEP_SUMMARY
            echo "2. Check Railway service configuration" >> $GITHUB_STEP_SUMMARY
            echo "3. Validate application health checks" >> $GITHUB_STEP_SUMMARY
            
            exit 1
          fi
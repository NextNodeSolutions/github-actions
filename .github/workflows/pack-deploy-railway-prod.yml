name: Railway Production Deployment

on:
  workflow_call:
    inputs:
      app-name:
        description: 'Application name (e.g., nextnode-front, yasmine)'
        required: true
        type: string
      project-name:
        description: 'Railway project name (defaults to repository name)'
        required: false
        default: ''
        type: string
      domain:
        description: 'Custom domain for DNS configuration'
        required: false
        type: string
      node-version:
        description: 'Node.js version'
        required: false
        default: '22'
        type: string
      pnpm-version:
        description: 'pnpm version'
        required: false
        default: '10.11.0'
        type: string
      working-directory:
        description: 'Working directory'
        required: false
        default: '.'
        type: string
      checkout-ref:
        description: 'Git ref to checkout'
        required: false
        default: 'main'
        type: string
      app-env:
        description: 'Application environment variable'
        required: false
        default: 'PROD'
        type: string
      build-command:
        description: 'Custom build command'
        required: false
        default: ''
        type: string
      start-command:
        description: 'Custom start command'
        required: false
        default: ''
        type: string
      run-quality-checks:
        description: 'Run quality checks before deployment'
        required: false
        default: true
        type: boolean
      require-approval:
        description: 'Require manual approval'
        required: false
        default: true
        type: boolean
      deploy-detach:
        description: 'Deploy without waiting for completion'
        required: false
        default: false
        type: boolean
    secrets:
      RAILWAY_TOKEN:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ZONE_ID:
        required: false
    outputs:
      deployed-url:
        description: 'Deployed application URL'
        value: ${{ jobs.deploy.outputs.railway-url }}
      service-name:
        description: 'Generated service name'
        value: ${{ jobs.deploy.outputs.service-name }}
      deployment-status:
        description: 'Overall deployment status'
        value: ${{ jobs.summary.outputs.status }}

jobs:
  quality-checks:
    name: Quality Assurance
    if: inputs.run-quality-checks
    uses: ./.github/workflows/pack-quality-checks.yml
    with:
      run-lint: true
      run-typecheck: true
      run-test: true
      run-build: true
      run-security: true      # Full security for production
      test-coverage: true     # Full coverage for production
      node-version: ${{ inputs.node-version }}
      pnpm-version: ${{ inputs.pnpm-version }}
      working-directory: ${{ inputs.working-directory }}

  approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: [quality-checks]
    if: inputs.require-approval && (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped')
    environment: production
    steps:
      - name: Request Manual Approval
        run: |
          echo "## 🚨 Production Deployment Approval Required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** \`${{ inputs.app-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target Service:** \`prod-${{ inputs.app-name }}\` (auto-generated)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch/Ref:** \`${{ inputs.checkout-ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Working Directory:** \`${{ inputs.working-directory }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Pre-deployment Checklist" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Quality checks: ${{ needs.quality-checks.result || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Code review completed" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Development testing validated" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Performance impact assessed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔍 **This will deploy to Railway's production environment.**" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Click 'Review deployments' and approve to proceed.**" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Railway Production Deploy
    needs: [quality-checks, approval]
    if: always() && (needs.quality-checks.result == 'success' || needs.quality-checks.result == 'skipped') && (needs.approval.result == 'success' || !inputs.require-approval)
    uses: ./.github/workflows/job-deploy-railway.yml
    with:
      environment: production
      app-name: ${{ inputs.app-name }}
      project-name: ${{ inputs.project-name }}
      checkout-ref: ${{ inputs.checkout-ref }}
      app-env: ${{ inputs.app-env }}
      build-command: ${{ inputs.build-command }}
      start-command: ${{ inputs.start-command }}
      deploy-detach: ${{ inputs.deploy-detach }}
    secrets:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  dns-configuration:
    name: Configure DNS
    needs: [deploy]
    if: needs.deploy.result == 'success' && inputs.domain
    runs-on: ubuntu-latest
    outputs:
      dns-configured: ${{ steps.dns-setup.outputs.configured }}
    steps:
      - name: Setup Production DNS
        id: dns-setup
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "⚠️ Cloudflare API token not provided, skipping DNS configuration"
            echo "💡 Add CLOUDFLARE_API_TOKEN secret to enable automatic DNS setup"
            echo "configured=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Extract Railway domain from deployment URL
          RAILWAY_DOMAIN=$(echo "${{ needs.deploy.outputs.railway-url }}" | sed 's|https://||' | sed 's|http://||')
          
          if [ -z "$RAILWAY_DOMAIN" ]; then
            echo "❌ Could not determine Railway domain from deployment URL"
            echo "configured=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "🌐 Production DNS Configuration:"
          echo "   Domain: ${{ inputs.domain }}"
          echo "   Target: $RAILWAY_DOMAIN"
          echo "   Record: CNAME @ → $RAILWAY_DOMAIN"
          
          # Note: For production, you might want to use the full DNS workflow
          # This is a placeholder for manual setup instructions
          echo "📝 **Manual DNS Setup Required:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to your Cloudflare dashboard" >> $GITHUB_STEP_SUMMARY
          echo "2. Add/Update CNAME record:" >> $GITHUB_STEP_SUMMARY
          echo "   - Name: @ (or your domain)" >> $GITHUB_STEP_SUMMARY
          echo "   - Target: $RAILWAY_DOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "   - Proxy: Enabled (orange cloud)" >> $GITHUB_STEP_SUMMARY
          
          echo "configured=manual" >> $GITHUB_OUTPUT

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [quality-checks, approval, deploy, dns-configuration]
    if: always()
    outputs:
      status: ${{ steps.determine-status.outputs.status }}
    steps:
      - name: Determine Overall Status
        id: determine-status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            OVERALL_STATUS="✅ SUCCESS"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            OVERALL_STATUS="❌ FAILED"
          fi
          echo "OVERALL_STATUS=$OVERALL_STATUS" >> $GITHUB_ENV
      
      - name: Generate Production Summary
        run: |
          echo "## 🚀 Railway Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status:** $OVERALL_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** \`prod-${{ inputs.app-name }}\` (auto-generated)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality-checks.result || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manual Approval | ${{ needs.approval.result || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway Deploy | ${{ needs.deploy.result || '❌ failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DNS Configuration | ${{ needs.dns-configuration.result || '⏭️ skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "### 🎯 Production Deployment Details" >> $GITHUB_STEP_SUMMARY
            echo "- **Railway URL:** ${{ needs.deploy.outputs.railway-url }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Service Name:** ${{ needs.deploy.outputs.service-name }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Environment:** Production" >> $GITHUB_STEP_SUMMARY
            echo "- **Branch:** ${{ inputs.checkout-ref }}" >> $GITHUB_STEP_SUMMARY
            
            if [[ -n "${{ inputs.domain }}" ]]; then
              echo "- **Custom Domain:** ${{ inputs.domain }}" >> $GITHUB_STEP_SUMMARY
              if [[ "${{ needs.dns-configuration.outputs.dns-configured }}" == "manual" ]]; then
                echo "  - ⚠️ Manual DNS setup required (see above)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🎉 **Production deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY
            echo "🌍 **Your application is now live in production.**" >> $GITHUB_STEP_SUMMARY
            
            # Cost savings reminder
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "💰 **Cost Optimization:** You're now using Railway instead of Fly.io!" >> $GITHUB_STEP_SUMMARY
            echo "📊 **Estimated Savings:** ~60-70% reduction in hosting costs" >> $GITHUB_STEP_SUMMARY
            
          else
            echo "### ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "The production deployment could not be completed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Troubleshooting Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Check Railway token permissions and validity" >> $GITHUB_STEP_SUMMARY
            echo "2. Verify Railway service configuration" >> $GITHUB_STEP_SUMMARY
            echo "3. Review application build and health checks" >> $GITHUB_STEP_SUMMARY
            echo "4. Ensure all environment variables are properly set" >> $GITHUB_STEP_SUMMARY
            
            exit 1
          fi